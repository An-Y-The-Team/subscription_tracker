version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sub_tracker_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: household
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sub_tracker_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app  # Live reload for backend development
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/household
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sub_tracker_frontend
    ports:
      - "3000:3000"
    environment:
      # Use localhost for client-side fetching, or the container name 'backend' for SSR
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  # --- Authentik: self-hosted OIDC identity provider (auth for the app) ---
  # The app's own Postgres ("db" above) is kept separate from Authentik's database.
  # All services share Compose's default network, so the backend can later reach
  # Authentik server-to-server at http://authentik-server:9000, while the browser
  # uses http://localhost:9000. (The issuer/redirect URL strategy is finalized in
  # Part A — the OIDC issuer must be reachable from BOTH the backend and the browser.)
  authentik-postgres:
    image: postgres:16-alpine
    container_name: authentik_db
    environment:
      POSTGRES_USER: ${AUTHENTIK_PG_USER:-authentik}
      POSTGRES_PASSWORD: ${AUTHENTIK_PG_PASS:-authentik-dev-password}
      POSTGRES_DB: ${AUTHENTIK_PG_DB:-authentik}
    volumes:
      - authentik_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  authentik-redis:
    image: redis:alpine
    container_name: authentik_redis
    command: --save 60 1 --loglevel warning
    volumes:
      - authentik_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  authentik-server:
    # Pin AUTHENTIK_TAG in .env to the current stable from https://goauthentik.io
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2026.2}
    container_name: authentik_server
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-dev-only-insecure-secret-change-me-0000000000000000}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS:-authentik-dev-password}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    ports:
      - "9000:9000"
      - "9443:9443"
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2026.2}
    container_name: authentik_worker
    command: worker
    # Runs as root so it can manage the embedded outpost via the Docker socket.
    user: root
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-dev-only-insecure-secret-change-me-0000000000000000}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS:-authentik-dev-password}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy

volumes:
  postgres_data:
  authentik_postgres_data:
  authentik_redis_data:
  authentik_media:
  authentik_templates: